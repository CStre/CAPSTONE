# Deploy — QA environment
#
# Triggered by every push to the main branch.
# Identical pipeline to deploy-dev.yml — checks + terraform + build + deploy + DAST.
# PRs to main are enforced to come from develop (ci.yml source-branch check).

name: Deploy QA

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-qa
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_ACCOUNT_ID: "958941188378"
  AWS_REGION: us-east-1
  ENVIRONMENT: qa
  NODE_VERSION: "20"
  TF_VERSION: "1.9.8"
  TF_STATE_KEY: bba/qa/terraform.tfstate

jobs:
  frontend-quality:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm test -- --coverage --watchAll=false
        working-directory: frontend
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 1

  backend-quality:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run lint
        working-directory: backend
      - run: npm test -- --coverage
        working-directory: backend
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 1

  sast:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: semgrep/semgrep-action@v1
        with:
          config: "p/security-audit p/secrets p/typescript p/owasp-top-ten"

  secrets-scan:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dep-scan:
    name: Dependencies — Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          skip-dirs: legacy

  iac-scan:
    name: IaC — Checkov & tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          soft_fail: true
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/
          soft_fail: true

  sbom:
    name: SBOM — Syft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          artifact-name: bba-qa-sbom.cdx.json

  sonarcloud:
    name: Code Quality — SonarCloud
    needs: [frontend-quality, backend-quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
      - uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  terraform:
    name: Terraform — QA
    needs:
      [
        frontend-quality,
        backend-quality,
        sast,
        secrets-scan,
        dep-scan,
        iac-scan,
      ]
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: read
      id-token: write
    outputs:
      cognito_user_pool_id: ${{ steps.tf-out.outputs.cognito_user_pool_id }}
      cognito_client_id: ${{ steps.tf-out.outputs.cognito_client_id }}
      graphql_url: ${{ steps.tf-out.outputs.graphql_url }}
      frontend_bucket: ${{ steps.tf-out.outputs.frontend_bucket }}
      cloudfront_distribution_id: ${{ steps.tf-out.outputs.cloudfront_distribution_id }}
      ecr_repository_url: ${{ steps.tf-out.outputs.ecr_repository_url }}
      lambda_function_name: ${{ steps.tf-out.outputs.lambda_function_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/bba-qa-deploy
          role-session-name: gh-deploy-qa-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config="key=${{ env.TF_STATE_KEY }}"
      - name: Terraform Apply
        working-directory: infra
        env:
          TF_VAR_environment: ${{ env.ENVIRONMENT }}
          TF_VAR_unsplash_access_key: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: terraform apply -auto-approve
      - name: Read outputs
        id: tf-out
        working-directory: infra
        run: |
          echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_OUTPUT
          echo "cognito_client_id=$(terraform output -raw cognito_client_id)"       >> $GITHUB_OUTPUT
          echo "graphql_url=$(terraform output -raw graphql_url)"                   >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)"           >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_OUTPUT
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)"   >> $GITHUB_OUTPUT
          echo "lambda_function_name=$(terraform output -raw lambda_function_name)" >> $GITHUB_OUTPUT

  build-lambda:
    name: Lambda — Build & Push
    needs:
      [
        frontend-quality,
        backend-quality,
        sast,
        secrets-scan,
        dep-scan,
        terraform,
      ]
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: read
      id-token: write
    outputs:
      image-uri: ${{ steps.push.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/bba-qa-deploy
          role-session-name: gh-lambda-qa-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: docker build --platform linux/amd64 -t bba-qa-graphql:$IMAGE_TAG backend/
      - name: Scan image — Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: bba-qa-graphql:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
      - name: Push to ECR
        id: push
        env:
          ECR_URL: ${{ needs.terraform.outputs.ecr_repository_url }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag bba-qa-graphql:$IMAGE_TAG $ECR_URL:$IMAGE_TAG
          docker push $ECR_URL:$IMAGE_TAG
          echo "image-uri=$ECR_URL:$IMAGE_TAG" >> $GITHUB_OUTPUT

  build-frontend:
    name: Frontend — Build
    needs: [terraform]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - name: Build
        working-directory: frontend
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ needs.terraform.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ needs.terraform.outputs.cognito_client_id }}
          VITE_GRAPHQL_URL: ${{ needs.terraform.outputs.graphql_url }}
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy — QA
    needs: [build-frontend, build-lambda, terraform]
    runs-on: ubuntu-latest
    environment: qa
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/bba-qa-deploy
          role-session-name: gh-deploy-sync-qa-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Sync frontend to S3
        run: |
          aws s3 sync dist/ s3://${{ needs.terraform.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ needs.terraform.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"
      - name: Update Lambda image
        run: |
          aws lambda update-function-code \
            --function-name ${{ needs.terraform.outputs.lambda_function_name }} \
            --image-uri ${{ needs.build-lambda.outputs.image-uri }}
          aws lambda wait function-updated \
            --function-name ${{ needs.terraform.outputs.lambda_function_name }}
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ needs.terraform.outputs.cloudfront_distribution_id }} \
            --paths "/*"

  dast:
    name: DAST — OWASP ZAP
    needs: [deploy, terraform]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/bba-qa-deploy
          role-session-name: gh-dast-qa-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get CloudFront URL
        id: cf
        run: |
          sleep 30
          DOMAIN=$(aws cloudfront get-distribution \
            --id ${{ needs.terraform.outputs.cloudfront_distribution_id }} \
            --query 'Distribution.DomainName' --output text)
          echo "url=https://$DOMAIN" >> $GITHUB_OUTPUT
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ steps.cf.outputs.url }}
          fail_action: false

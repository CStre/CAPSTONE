# SonarCloud configuration
# Set up at: https://sonarcloud.io → Import from GitHub → CStre/CAPSTONE
# Copy the project key and organization from the SonarCloud dashboard.

sonar.projectKey=CStre_CAPSTONE
sonar.organization=cstre

# Source and test paths
sonar.sources=frontend/src,backend/src
sonar.tests=frontend/src,backend/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Coverage reports (LCOV format from Jest)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info

# Exclusions — don't scan legacy code, generated files, or node_modules
sonar.exclusions=\
  legacy/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  frontend/src/gql/**,\
  **/*.d.ts

# Language
sonar.sourceEncoding=UTF-8

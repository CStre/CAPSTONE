"""A travel destination in the catalog."""
type Country {
  """ISO 3166-1 alpha-2 code."""
  code: ID!
  name: String!
}

"""A single country's preference score for a user (0–100)."""
type CountryPreference {
  country: Country!
  value: Int!
}

input FeedbackInput {
  """Country code the feedback applies to."""
  country: ID!

  """true = liked, false = disliked."""
  liked: Boolean!
}

"""Which slides of a Learn-page section a user has viewed."""
type LearnSectionProgress {
  sectionId: ID!

  """Viewed slide indices (ascending). Completion is derived client-side."""
  viewedSlides: [Int!]!
}

"""One section's viewed slide indices, sent from the client to merge."""
input LearnSectionProgressInput {
  sectionId: ID!
  viewedSlides: [Int!]!
}

type Mutation {
  """Delete the user's stored data."""
  deleteAccount: Boolean!

  """
  Look up the email address associated with a verified phone number. Returns null if no account is found. Used for the forgot-email recovery flow — the caller must still complete a Cognito password-reset code to prove email ownership.
  """
  findEmailByPhone(phone: String!): String

  """
  Union a batch of client-recorded progress into the stored progress (used on sign-in to reconcile offline progress); returns the full updated progress.
  """
  mergeLearnProgress(progress: [LearnSectionProgressInput!]!): [LearnSectionProgress!]!

  """
  Record that a Learn-page slide was viewed; returns the full updated progress.
  """
  recordSlideView(sectionId: ID!, slideIndex: Int!): [LearnSectionProgress!]!

  """Clear all of the user's stored Learn-page progress."""
  resetLearnProgress: Boolean!

  """
  Run a batch of like/dislike feedback through the algorithm and persist it.
  """
  submitFeedback(feedback: [FeedbackInput!]!): User!
}

type Query {
  """The full country catalog."""
  countries: [Country!]!

  """The authenticated user, or null if not signed in."""
  me: User

  """A batch of travel photos, weighted by the user's preferences."""
  travelImages(count: Int = 8): [TravelImage!]!
}

"""A travel photo for the user to rate."""
type TravelImage {
  attribution: String!
  country: Country!
  imageUrl: String!
}

"""
The authenticated user. Identity comes from Cognito; preferences from DynamoDB.
"""
type User {
  email: String!
  id: ID!

  """Per-section Learn-page progress (sparse — only touched sections)."""
  learnProgress: [LearnSectionProgress!]!
  name: String!

  """
  Every catalog country with its current score (neutral default filled in).
  """
  preferences: [CountryPreference!]!
}

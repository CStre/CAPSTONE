<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive look at preference-learning algorithms." />
    <title>Building Better Algorithms</title>
    <!-- Apply saved theme before React mounts to prevent flash of wrong theme. -->
    <script>
      (function () {
        var t = localStorage.getItem('bba-theme');
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
